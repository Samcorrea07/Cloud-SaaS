apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudtask-api
  labels:
    app: cloudtask-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudtask-api
  template:
    metadata:
      labels:
        app: cloudtask-api
    spec:
      containers:
        - name: cloudtask-api
          image: cloudtask-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: SECRET_KEY
            - name: STORAGE_BACKEND
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: STORAGE_BACKEND
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: AWS_S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudtask-secret
                  key: AWS_SESSION_TOKEN
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
